<script>
  document.addEventListener("keydown", (event) => {
    if (event.key !== "Escape") {
      return;
    }

    document
      .querySelectorAll(".site-nav .nav-dropdown[open]")
      .forEach((dropdown) => {
        const summary = dropdown.querySelector("summary");
        dropdown.open = false;
        if (summary) {
          summary.focus();
        }
      });
  });
</script>
    
<div class="fb-wrap">
	<p class="eyebrow" style="margin-bottom: 1.25rem;">Feedback</p>
	<h1 class="display fb-h1">Tell us what<br>you think.</h1>
	<p class="fb-sub">Spotted a bug? Want a race added? Have an idea? We read everything.</p>

	<form
		name="feedback"
		method="POST"
		data-netlify="true"
		netlify-honeypot="bot-field"
		class="fb-form"
	>
		<input type="hidden" name="form-name" value="feedback" />
		<p style="display:none"><label>Skip this: <input name="bot-field" /></label></p>

		<div class="fb-field">
			<label for="fb-type">Type</label>
			<select id="fb-type" name="type" required class="fb-select">
				<option value="" disabled selected>Select one…</option>
				<option value="feature">Feature request</option>
				<option value="race">Add a race</option>
				<option value="bug">Bug report</option>
				<option value="other">General feedback</option>
			</select>
		</div>

		<div class="fb-field">
			<label for="fb-message">Message</label>
			<textarea
				id="fb-message"
				name="message"
				rows="5"
				placeholder="What's on your mind?"
				required
				class="fb-textarea"
			></textarea>
		</div>

		<div class="fb-field">
			<label for="fb-email">Email <span class="fb-optional">(optional — only if you want a reply)</span></label>
			<input
				type="email"
				id="fb-email"
				name="email"
				placeholder="your@email.com"
				autocomplete="email"
				class="fb-input"
			/>
		</div>

		<button type="submit" class="fb-btn">Send feedback →</button>
	</form>
</div>

<style>

	font-weight: 600;

	font-weight: 400;
	text-transform: none;
	letter-spacing: 0;
	color: #999;
}
.fb-input,
.fb-select,

	color: #141414;
	outline: none;
	transition: border-color 0.15s;

	box-sizing: border-box;
}
.fb-input:focus,
.fb-select:focus,
.fb-textarea:focus {
	border-color: #C0392B;
}
.fb-textarea {
	resize: vertical;
	min-height: 120px;
}
.fb-btn {
	align-self: flex-start;
	padding: 0.75rem 1.75rem;
	background: #C0392B;

	border-radius: 6px;

}
