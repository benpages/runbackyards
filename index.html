<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Backyard Ultra — Pacing Analysis</title>
		<style>
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			body {
				font-family:
					-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
					sans-serif;
				background: #f5f5f5;
				color: #1a1a1a;
				min-height: 100vh;
			}

			header {
				background: #1a1a1a;
				color: #fff;
				padding: 1.5rem 2rem;
				display: flex;
				align-items: baseline;
				gap: 1rem;
				flex-wrap: wrap;
			}
			header h1 {
				font-size: 1.3rem;
				font-weight: 600;
				letter-spacing: -0.01em;
			}
			header p {
				font-size: 0.85rem;
				color: #aaa;
			}

			.controls {
				background: #fff;
				border-bottom: 1px solid #e5e5e5;
				padding: 0.75rem 2rem;
				display: flex;
				align-items: center;
				gap: 1rem;
				flex-wrap: wrap;
			}
			.controls label {
				font-size: 0.8rem;
				color: #666;
				font-weight: 500;
				text-transform: uppercase;
				letter-spacing: 0.04em;
			}
			.controls select {
				font-size: 0.9rem;
				padding: 0.35rem 0.65rem;
				border: 1px solid #ddd;
				border-radius: 6px;
				background: #fafafa;
				cursor: pointer;
			}
			.controls select:focus {
				outline: 2px solid #c0392b;
				outline-offset: 1px;
			}

			.quick-btns {
				display: flex;
				gap: 5px;
			}
			.qbtn {
				font-size: 0.78rem;
				padding: 0.3rem 0.8rem;
				border: 1px solid #ddd;
				border-radius: 20px;
				background: #fafafa;
				cursor: pointer;
				color: #555;
				transition: background 0.12s, border-color 0.12s, color 0.12s;
				white-space: nowrap;
			}
			.qbtn:hover {
				background: #efefef;
				border-color: #bbb;
			}

			.status {
				padding: 3rem 2rem;
				text-align: center;
				color: #888;
				font-size: 0.9rem;
			}
			.status.error {
				color: #c0392b;
			}

			main {
				padding: 1.5rem 2rem;
			}

			.stats {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
				gap: 10px;
				margin-bottom: 1.5rem;
			}
			.stat {
				background: #fff;
				border-radius: 8px;
				border: 1px solid #eee;
				padding: 0.85rem 1rem;
			}
			.stat-label {
				font-size: 0.72rem;
				color: #888;
				text-transform: uppercase;
				letter-spacing: 0.05em;
				margin-bottom: 4px;
			}
			.stat-value {
				font-size: 1.5rem;
				font-weight: 600;
				color: #1a1a1a;
			}
			.stat-sub {
				font-size: 0.75rem;
				color: #aaa;
				margin-top: 2px;
			}

			.card {
				background: #fff;
				border-radius: 10px;
				border: 1px solid #eee;
				padding: 1.25rem 1.5rem;
			}
			.card-title {
				font-size: 0.8rem;
				font-weight: 600;
				text-transform: uppercase;
				letter-spacing: 0.05em;
				color: #888;
				margin-bottom: 1rem;
			}

			/* ── Legend search + pills ───────────────────────────────── */
			.legend-bar {
				display: flex;
				align-items: center;
				justify-content: space-between;
				gap: 0.75rem;
				margin-bottom: 0.85rem;
				flex-wrap: wrap;
			}
			#runnerSearch {
				flex: 0 0 auto;
				width: 200px;
				padding: 0.35rem 0.9rem;
				border: 1px solid #ddd;
				border-radius: 20px;
				font-size: 0.82rem;
				color: #333;
				background: #fafafa;
				outline: none;
				transition: border-color 0.15s;
			}
			#runnerSearch:focus {
				border-color: #c0392b;
				background: #fff;
			}
			#runnerSearch::placeholder {
				color: #bbb;
			}

			#legend {
				display: flex;
				gap: 6px;
				flex-wrap: wrap;
			}
			.leg-item {
				display: flex;
				align-items: center;
				gap: 6px;
				cursor: pointer;
				padding: 5px 10px;
				border-radius: 6px;
				border: 1px solid #e0e0e0;
				user-select: none;
				background: #fff;
				transition: opacity 0.15s, border-color 0.15s;
			}
			.leg-item:hover {
				border-color: #bbb;
				background: #f7f7f7;
			}
			/* Hidden = runner not on chart */
			.leg-item.off {
				opacity: 0.45;
			}
			/* Visible = runner shown on chart — colored left border */
			.leg-item.on {
				border-left-width: 3px;
				padding-left: 8px;
			}
			.leg-swatch {
				flex-shrink: 0;
				display: block;
			}
			.leg-name {
				font-size: 0.78rem;
				color: #333;
				white-space: nowrap;
			}

			.show-more-btn {
				font-size: 0.75rem;
				padding: 5px 12px;
				border-radius: 6px;
				border: 1px dashed #ccc;
				background: #fafafa;
				color: #888;
				cursor: pointer;
				white-space: nowrap;
				align-self: center;
			}
			.show-more-btn:hover {
				background: #f0f0f0;
				border-color: #aaa;
				color: #444;
			}

			.chart-wrap {
				position: relative;
				width: 100%;
				height: 420px;
			}

			footer {
				text-align: center;
				padding: 2rem;
				font-size: 0.75rem;
				color: #bbb;
			}

			@media (max-width: 600px) {
				header,
				.controls,
				main {
					padding-left: 1rem;
					padding-right: 1rem;
				}
				.chart-wrap {
					height: 300px;
				}
				#runnerSearch {
					width: 100%;
				}
			}
		</style>
	</head>
	<body>
		<header>
			<h1>Backyard Ultra — Pacing Analysis</h1>
			<p>Lap finish time by loop · Click a name to toggle</p>
		</header>

		<div class="controls">
			<label for="raceSelect">Race</label>
			<select id="raceSelect"></select>
		</div>

		<div id="status" class="status">Loading race data…</div>

		<main id="main" style="display: none">
			<div class="stats" id="statsRow"></div>
			<div class="card">
				<div class="card-title">Lap finish time (min) · by loop number</div>
				<div class="legend-bar">
					<input
						type="search"
						id="runnerSearch"
						placeholder="Find a runner…"
						autocomplete="off"
					/>
					<div class="quick-btns">
						<button class="qbtn" id="btnTop3">Top 3</button>
						<button class="qbtn" id="btnAll">Show all</button>
						<button class="qbtn" id="btnNone">Hide all</button>
					</div>
				</div>
				<div id="legend"></div>
				<div class="chart-wrap" style="margin-top: 1rem">
					<canvas id="chart" role="img" aria-label="Line chart of lap finish time by loop number."></canvas>
				</div>
			</div>
		</main>

		<footer>Data sourced live from raceresult.com · backyards.run</footer>

		<!-- ─── CONFIGURATION ──────────────────────────────────────────────────────── -->
		<script>
			const RACES = [
				{
					id: "G1M_2026",
					label: "Go One More 2026",
					eventId: "390956",
					apiKey: "f545f563e8d28831fb09508cd63b1365",
					listname: "Lists|Detail List",
					page: "details1",
					startHour: 12, // ← 24h local time. Add this to any race to enable night bands + time-of-day tooltips.
				},
				// {
				//   id: "LastSoul_2026",
				//   label: "Last Soul Standing 2026",
				//   eventId: "XXXXX",
				//   apiKey: "...",
				//   listname: "Lists|Detail List",
				//   page: "details1",
				//   // no startHour → night bands won't show for this race
				// },
			];

			const PALETTE = [
				{ color: "#C0392B", dash: [] },
				{ color: "#922B21", dash: [6, 3] },
				{ color: "#1A5276", dash: [] },
				{ color: "#2471A3", dash: [5, 3] },
				{ color: "#D35400", dash: [] },
				{ color: "#1E8449", dash: [4, 2] },
				{ color: "#117A65", dash: [] },
				{ color: "#0E6655", dash: [6, 2] },
				{ color: "#7D3C98", dash: [] },
				{ color: "#6C3483", dash: [4, 2] },
				{ color: "#4A235A", dash: [2, 2] },
				{ color: "#B7950B", dash: [] },
				{ color: "#935116", dash: [5, 2] },
				{ color: "#616A6B", dash: [] },
				{ color: "#2C3E50", dash: [3, 3] },
			];
		</script>
		<!-- ─────────────────────────────────────────────────────────────────────────── -->

		<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
		<script>
			// ── Helpers ────────────────────────────────────────────────────────────────────

			// "MM:SS" or "MM:SS:00" → decimal minutes
			function toLapMin(t) {
				if (!t) return null;
				const parts = t.split(":").map(Number);
				if (parts.length < 2 || isNaN(parts[0]) || isNaN(parts[1])) return null;
				return parts[0] + parts[1] / 60;
			}

			function fmtMin(m) {
				const mins = Math.floor(m);
				const secs = Math.round((m - mins) * 60);
				return `${mins}:${String(secs).padStart(2, "0")}`;
			}

			// Time-of-day string for a given lap number + race start hour
			// e.g. lapNum=1, startHour=12 → "12 pm"  |  lapNum=10 → "9 pm"
			function todStr(lapNum, startHour) {
				const h = (startHour + lapNum - 1) % 24;
				if (h === 0) return "12 am";
				if (h < 12) return `${h} am`;
				if (h === 12) return "12 pm";
				return `${h - 12} pm`;
			}

			// Returns [[xMin, xMax], …] index ranges for 9 pm – 6 am bands
			function nightBands(startHour, maxLap) {
				const bands = [];
				let open = null;
				for (let i = 1; i <= maxLap + 1; i++) {
					const h = (startHour + i - 1) % 24;
					const isNight = h >= 21 || h < 6;
					if (isNight && open === null) open = i - 1.5; // 0-based index, leading edge
					if (!isNight && open !== null) {
						bands.push([open, i - 1.5]);
						open = null;
					}
				}
				if (open !== null) bands.push([open, maxLap - 0.5]);
				return bands;
			}

			// "LastName FirstName" → "FirstName LastName"
			function fullDisplayName(stored) {
				const parts = stored.trim().split(" ");
				if (parts.length < 2) return stored;
				return parts.slice(1).join(" ") + " " + parts[0];
			}

			// ── raceresult parsing ─────────────────────────────────────────────────────────

			function parseRaceresultData(apiData, raceConfig) {
				const rows = [];
				Object.entries(apiData).forEach(([key, lapRows]) => {
					// key: "#N_LastName, FirstName /// N Laps /// Total Time: HH:MM:SS"
					const namePart = key.split(" /// ")[0].replace(/^#\d+_/, "").trim();
					const commaIdx = namePart.indexOf(", ");
					// Store as "LastName FirstName" internally
					const athleteName =
						commaIdx !== -1
							? namePart.substring(0, commaIdx) + " " + namePart.substring(commaIdx + 2)
							: namePart;

					const lapMatch = key.match(/(\d+) Laps?/i);
					const totalLaps = lapMatch ? parseInt(lapMatch[1]) : lapRows.length;

					lapRows.forEach((row) => {
						if (!Array.isArray(row) || row.length < 7) return;
						const lapLabel = row[3];
						if (!lapLabel || !lapLabel.startsWith("Lap")) return;
						rows.push({
							athlete: athleteName,
							race: raceConfig.id,
							total_laps: totalLaps,
							lap: lapLabel,
							finish_time: row[5],
							rest_time: row[6],
						});
					});
				});
				return rows;
			}

			// ── Module state ───────────────────────────────────────────────────────────────
			let allRows = [];
			let chart = null;
			let currentDatasets = [];
			let globalMaxLap = 0;

			const statusEl = document.getElementById("status");
			const mainEl = document.getElementById("main");
			const raceSelect = document.getElementById("raceSelect");
			const searchInput = document.getElementById("runnerSearch");

			Chart.register(window["chartjs-plugin-annotation"]);

			raceSelect.innerHTML = RACES.map(
				(r) => `<option value="${r.id}">${r.label}</option>`,
			).join("");

			// ── Fetch ──────────────────────────────────────────────────────────────────────

			async function loadRace(raceConfig) {
				statusEl.textContent = `Loading ${raceConfig.label}…`;
				statusEl.className = "status";
				statusEl.style.display = "block";
				mainEl.style.display = "none";
				searchInput.value = "";

				const url = `https://my4.raceresult.com/${raceConfig.eventId}/${raceConfig.page}/list?key=${raceConfig.apiKey}&listname=${encodeURIComponent(raceConfig.listname)}&page=${raceConfig.page}`;
				try {
					const res = await fetch(url);
					if (!res.ok) throw new Error("HTTP " + res.status);
					const json = await res.json();
					if (!json.data) throw new Error("'data' field missing");

					const raceRows = parseRaceresultData(json.data, raceConfig);
					if (!raceRows.length) throw new Error("No lap rows parsed");

					allRows = allRows.filter((r) => r.race !== raceConfig.id).concat(raceRows);
					renderChart(raceConfig.id);
				} catch (e) {
					let msg = `Could not load ${raceConfig.label}: ${e.message}.`;
					if (e.message === "Failed to fetch")
						msg += " Possible CORS issue — open from backyards.run, not a local file.";
					statusEl.textContent = msg;
					statusEl.className = "status error";
				}
			}

			// ── Visibility helpers ─────────────────────────────────────────────────────────

			function applyVisibleRange() {
				if (!chart) return;
				let max = 0;
				currentDatasets.forEach((ds, i) => {
					if (chart.isDatasetVisible(i)) max = Math.max(max, ds.totalLaps);
				});
				if (max === 0) max = globalMaxLap;
				chart.options.scales.x.max = "L" + max;
				chart.update("none");
			}

			function setVisibility(predicate) {
				if (!chart) return;
				currentDatasets.forEach((ds, i) => {
					chart.setDatasetVisibility(i, predicate(ds, i));
				});
				applyVisibleRange();
				syncLegendItems();
			}

			function syncLegendItems() {
				document.querySelectorAll(".leg-item[data-idx]").forEach((item) => {
					const idx = parseInt(item.dataset.idx, 10);
					const visible = chart.isDatasetVisible(idx);
					item.classList.toggle("on", visible);
					item.classList.toggle("off", !visible);
				});
			}

			// ── Quick buttons ──────────────────────────────────────────────────────────────
			document.getElementById("btnTop3").addEventListener("click", () => setVisibility((ds, i) => i < 3));
			document.getElementById("btnAll").addEventListener("click", () => setVisibility(() => true));
			document.getElementById("btnNone").addEventListener("click", () => setVisibility(() => false));

			// ── Search ─────────────────────────────────────────────────────────────────────
			const LEGEND_INITIAL = 15;

			searchInput.addEventListener("input", function () {
				const term = this.value.toLowerCase().trim();
				const showMoreBtn = document.getElementById("showMoreBtn");

				if (term) {
					// While searching: reveal all pills, hide the "show more" button
					if (showMoreBtn) showMoreBtn.style.display = "none";
					document.querySelectorAll(".leg-item[data-idx]").forEach((item) => {
						const name = item.dataset.name || "";
						item.style.display = name.includes(term) ? "" : "none";
					});
				} else {
					// Cleared: restore overflow state
					if (showMoreBtn) {
						showMoreBtn.style.display = "";
						document.querySelectorAll(".leg-item[data-idx]").forEach((item) => {
							const idx = parseInt(item.dataset.idx, 10);
							item.style.display = idx >= LEGEND_INITIAL ? "none" : "";
						});
					} else {
						// Show more was already clicked — show everything
						document.querySelectorAll(".leg-item[data-idx]").forEach((item) => {
							item.style.display = "";
						});
					}
				}
			});

			// ── Render ─────────────────────────────────────────────────────────────────────
			function renderChart(raceId) {
				const raceConfig = RACES.find((r) => r.id === raceId);
				const rows = allRows.filter((r) => r.race === raceId);
				if (!rows.length) return;

				// Build per-athlete map
				const athleteMap = {};
				rows.forEach((r) => {
					if (!athleteMap[r.athlete])
						athleteMap[r.athlete] = { total: +r.total_laps, laps: {} };
					const n = parseInt((r.lap || "").replace(/\D/g, ""), 10);
					if (!isNaN(n)) athleteMap[r.athlete].laps[n] = toLapMin(r.finish_time);
				});

				// Sort by total laps descending
				const sorted = Object.entries(athleteMap).sort(
					([, a], [, b]) => b.total - a.total,
				);

				globalMaxLap = Math.max(...sorted.map(([, a]) => a.total));
				const xLabels = Array.from({ length: globalMaxLap }, (_, i) => `L${i + 1}`);

				currentDatasets = sorted.map(([name, athlete], i) => {
					const style = PALETTE[i % PALETTE.length];
					return {
						label: name.split(" ")[0] + " (" + athlete.total + ")",
						fullName: name,
						totalLaps: athlete.total,
						data: Array.from(
							{ length: globalMaxLap },
							(_, j) => athlete.laps[j + 1] ?? null,
						),
						borderColor: style.color,
						backgroundColor: "transparent",
						borderWidth: 2,
						pointRadius: 0,        // smooth line — no dots
						pointHoverRadius: 5,   // dots appear on hover only
						tension: 0.3,
						borderDash: style.dash,
						spanGaps: false,
					};
				});

				// Stats
				const winnerName = sorted[0] ? fullDisplayName(sorted[0][0]) : "";
				const allTimes = rows.map((r) => toLapMin(r.finish_time)).filter(Boolean);
				const avgTime = allTimes.reduce((a, b) => a + b, 0) / allTimes.length;

				document.getElementById("statsRow").innerHTML = `
	<div class="stat"><div class="stat-label">Runners</div><div class="stat-value">${sorted.length}</div></div>
	<div class="stat"><div class="stat-label">Most laps</div><div class="stat-value">${globalMaxLap}</div><div class="stat-sub">${winnerName}</div></div>
	<div class="stat"><div class="stat-label">Avg lap (all)</div><div class="stat-value">${fmtMin(avgTime)}</div></div>
	<div class="stat"><div class="stat-label">Race duration</div><div class="stat-value">${globalMaxLap}h</div><div class="stat-sub">~${(globalMaxLap / 24).toFixed(1)} days</div></div>
`;

				const step =
					globalMaxLap > 60 ? 10 : globalMaxLap > 30 ? 5 : globalMaxLap > 15 ? 2 : 1;
				const textColor = "#999";
				const gridColor = "rgba(0,0,0,0.06)";

				// Night bands — only when startHour is configured for this race
				const annotations = {};
				const hasStartTime = raceConfig && raceConfig.startHour !== undefined;
				if (hasStartTime) {
					nightBands(raceConfig.startHour, globalMaxLap).forEach(([s, e], i) => {
						annotations["night" + i] = {
							type: "box",
							xMin: s,
							xMax: e,
							yMin: 38,
							yMax: 62,
							backgroundColor: "rgba(20,30,90,0.07)",
							borderWidth: 0,
						};
						const mid = Math.round((s + e) / 2);
						if (mid < globalMaxLap - 1) {
							annotations["nightLabel" + i] = {
								type: "label",
								xValue: mid,
								yValue: 61.3,
								content: `Night ${i + 1}`,
								font: { size: 9 },
								color: "rgba(20,40,120,0.35)",
							};
						}
					});
				}

				if (chart) chart.destroy();
				chart = new Chart(document.getElementById("chart"), {
					type: "line",
					data: { labels: xLabels, datasets: currentDatasets },
					options: {
						responsive: true,
						maintainAspectRatio: false,
						animation: false,
						interaction: { mode: "index", intersect: false },
						plugins: {
							legend: { display: false },
							annotation: { annotations },
							tooltip: {
								callbacks: {
									title: (ctx) => {
										const lap = ctx[0].dataIndex + 1;
										if (hasStartTime) {
											return `Loop ${lap} · ${todStr(lap, raceConfig.startHour)}`;
										}
										return `Loop ${lap}`;
									},
									label: (ctx) =>
										ctx.parsed.y != null
											? ` ${ctx.dataset.label}: ${fmtMin(ctx.parsed.y)}`
											: null,
									filter: (item) => item.parsed.y != null,
								},
							},
						},
						scales: {
							x: {
								min: "L1",
								max: "L3", // updated immediately by setVisibility below
								ticks: {
									color: textColor,
									font: { size: 10 },
									maxRotation: 0,
									autoSkip: false,
									callback(val, i) {
										return (i + 1) % step === 0 || i === 0 ? xLabels[i] : "";
									},
								},
								grid: { color: gridColor },
							},
							y: {
								min: 38,
								max: 62,
								title: {
									display: true,
									text: "Lap finish time (min)",
									color: textColor,
									font: { size: 11 },
								},
								ticks: {
									color: textColor,
									font: { size: 11 },
									callback: (v) => v + " min",
								},
								grid: { color: gridColor },
							},
						},
					},
				});

				buildLegend();

				// Default: show top 3
				setVisibility((ds, i) => i < 3);

				statusEl.style.display = "none";
				mainEl.style.display = "block";
			}

			// ── Legend ─────────────────────────────────────────────────────────────────────
			function buildLegend() {
				const legendEl = document.getElementById("legend");
				legendEl.innerHTML = "";

				currentDatasets.forEach((ds, idx) => {
					const item = document.createElement("div");
					item.className = "leg-item";
					item.dataset.idx = idx;
					item.dataset.name = (ds.fullName + " " + ds.label).toLowerCase();

					// Collapse runners beyond the initial count
					if (idx >= LEGEND_INITIAL) item.style.display = "none";

					// Canvas swatch
					const sw = document.createElement("canvas");
					sw.width = 24;
					sw.height = 12;
					sw.className = "leg-swatch";
					sw.style.cssText = "width:24px;height:12px";
					const sc = sw.getContext("2d");
					sc.strokeStyle = ds.borderColor;
					sc.lineWidth = 2.5;
					if (ds.borderDash && ds.borderDash.length) sc.setLineDash(ds.borderDash);
					sc.beginPath();
					sc.moveTo(0, 6);
					sc.lineTo(24, 6);
					sc.stroke();

					const name = document.createElement("span");
					name.className = "leg-name";
					name.textContent = ds.label;

					item.appendChild(sw);
					item.appendChild(name);
					legendEl.appendChild(item);

					item.style.setProperty("border-left-color", ds.borderColor);

					item.addEventListener("click", () => {
						const isVisible = chart.isDatasetVisible(idx);
						chart.setDatasetVisibility(idx, !isVisible);
						item.classList.toggle("on", !isVisible);
						item.classList.toggle("off", isVisible);
						applyVisibleRange();
					});
				});

				// "Show more" button if there are hidden runners
				if (currentDatasets.length > LEGEND_INITIAL) {
					const more = document.createElement("button");
					more.className = "show-more-btn";
					more.id = "showMoreBtn";
					more.textContent = `+${currentDatasets.length - LEGEND_INITIAL} more runners`;
					more.addEventListener("click", () => {
						document.querySelectorAll(".leg-item[data-idx]").forEach((el) => {
							el.style.display = "";
						});
						more.remove();
					});
					legendEl.appendChild(more);
				}
			}

			// ── Init ───────────────────────────────────────────────────────────────────────
			raceSelect.addEventListener("change", () => {
				const cfg = RACES.find((r) => r.id === raceSelect.value);
				if (cfg) loadRace(cfg);
			});

			if (RACES.length > 0) loadRace(RACES[0]);
		</script>
	</body>
</html>
