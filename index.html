<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Backyard Ultra — Pacing Analysis</title>
		<style>
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			body {
				font-family:
					-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
					sans-serif;
				background: #f5f5f5;
				color: #1a1a1a;
				min-height: 100vh;
			}

			header {
				background: #1a1a1a;
				color: #fff;
				padding: 1.5rem 2rem;
				display: flex;
				align-items: baseline;
				gap: 1rem;
				flex-wrap: wrap;
			}
			header h1 {
				font-size: 1.3rem;
				font-weight: 600;
				letter-spacing: -0.01em;
			}
			header p {
				font-size: 0.85rem;
				color: #aaa;
			}

			.controls {
				background: #fff;
				border-bottom: 1px solid #e5e5e5;
				padding: 0.75rem 2rem;
				display: flex;
				align-items: center;
				gap: 1rem;
				flex-wrap: wrap;
			}
			.controls label {
				font-size: 0.8rem;
				color: #666;
				font-weight: 500;
				text-transform: uppercase;
				letter-spacing: 0.04em;
			}
			.controls select {
				font-size: 0.9rem;
				padding: 0.35rem 0.65rem;
				border: 1px solid #ddd;
				border-radius: 6px;
				background: #fafafa;
				cursor: pointer;
			}
			.controls select:focus {
				outline: 2px solid #c0392b;
				outline-offset: 1px;
			}

			.quick-btns {
				display: flex;
				gap: 5px;
				margin-left: auto;
			}
			.qbtn {
				font-size: 0.78rem;
				padding: 0.3rem 0.8rem;
				border: 1px solid #ddd;
				border-radius: 20px;
				background: #fafafa;
				cursor: pointer;
				color: #555;
				transition: background 0.12s, border-color 0.12s, color 0.12s;
				white-space: nowrap;
			}
			.qbtn:hover {
				background: #efefef;
				border-color: #bbb;
			}

			.status {
				padding: 3rem 2rem;
				text-align: center;
				color: #888;
				font-size: 0.9rem;
			}
			.status.error {
				color: #c0392b;
			}

			main {
				padding: 1.5rem 2rem;
			}

			.stats {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
				gap: 10px;
				margin-bottom: 1.5rem;
			}
			.stat {
				background: #fff;
				border-radius: 8px;
				border: 1px solid #eee;
				padding: 0.85rem 1rem;
			}
			.stat-label {
				font-size: 0.72rem;
				color: #888;
				text-transform: uppercase;
				letter-spacing: 0.05em;
				margin-bottom: 4px;
			}
			.stat-value {
				font-size: 1.5rem;
				font-weight: 600;
				color: #1a1a1a;
			}
			.stat-sub {
				font-size: 0.75rem;
				color: #aaa;
				margin-top: 2px;
			}

			.card {
				background: #fff;
				border-radius: 10px;
				border: 1px solid #eee;
				padding: 1.25rem 1.5rem;
			}
			.card-title {
				font-size: 0.8rem;
				font-weight: 600;
				text-transform: uppercase;
				letter-spacing: 0.05em;
				color: #888;
				margin-bottom: 1rem;
			}

			#legend {
				display: flex;
				gap: 8px;
				flex-wrap: wrap;
				margin-bottom: 1rem;
			}
			.leg-group-label {
				width: 100%;
				font-size: 0.7rem;
				color: #bbb;
				text-transform: uppercase;
				letter-spacing: 0.06em;
				padding-top: 4px;
			}
			.leg-item {
				display: flex;
				align-items: center;
				gap: 6px;
				cursor: pointer;
				padding: 4px 10px;
				border-radius: 6px;
				border: 1px solid #e5e5e5;
				user-select: none;
				transition: opacity 0.15s;
				background: #fafafa;
			}
			.leg-item:hover {
				border-color: #ccc;
				background: #f0f0f0;
			}
			.leg-item.hidden {
				opacity: 0.35;
			}
			.leg-item.hidden .leg-name {
				text-decoration: line-through;
			}
			.leg-swatch {
				flex-shrink: 0;
			}
			.leg-name {
				font-size: 0.78rem;
				color: #333;
				white-space: nowrap;
			}

			.chart-wrap {
				position: relative;
				width: 100%;
				height: 420px;
			}

			footer {
				text-align: center;
				padding: 2rem;
				font-size: 0.75rem;
				color: #bbb;
			}

			@media (max-width: 600px) {
				header,
				.controls,
				main {
					padding-left: 1rem;
					padding-right: 1rem;
				}
				.chart-wrap {
					height: 300px;
				}
				.quick-btns {
					margin-left: 0;
				}
			}
		</style>
	</head>
	<body>
		<header>
			<h1>Backyard Ultra — Pacing Analysis</h1>
			<p>Lap finish time by loop number · Click a name to toggle</p>
		</header>

		<div class="controls">
			<label for="raceSelect">Race</label>
			<select id="raceSelect"></select>
			<div class="quick-btns">
				<button class="qbtn" id="btnTop3">Top 3</button>
				<button class="qbtn" id="btnAll">Show all</button>
				<button class="qbtn" id="btnNone">Hide all</button>
			</div>
		</div>

		<div id="status" class="status">Loading race data…</div>

		<main id="main" style="display: none">
			<div class="stats" id="statsRow"></div>
			<div class="card">
				<div class="card-title">Lap finish time (min) · by loop number</div>
				<div id="legend"></div>
				<div class="chart-wrap">
					<canvas
						id="chart"
						role="img"
						aria-label="Line chart of lap finish time by loop number."
					></canvas>
				</div>
			</div>
		</main>

		<footer>Data sourced live from raceresult.com · backyards.run</footer>

		<!-- ─── CONFIGURATION ──────────────────────────────────────────────────────── -->
		<script>
			// ★ Add races here. eventId and apiKey come from the raceresult.com URL
			// visible in your browser's network inspector when you open a race's results page.
			const RACES = [
				{
					id: "G1M_2026",
					label: "Go One More 2026",
					eventId: "390956",
					apiKey: "f545f563e8d28831fb09508cd63b1365",
					listname: "Lists|Detail List",
					page: "details1",
				},
				// {
				//   id: "LastSoul_2026",
				//   label: "Last Soul Standing 2026",
				//   eventId: "XXXXX",
				//   apiKey: "...",
				//   listname: "Lists|Detail List",
				//   page: "details1",
				// },
			];

			// ★ Colour palette — cycles through for each runner
			const PALETTE = [
				{ color: "#C0392B", dash: [] },
				{ color: "#922B21", dash: [6, 3] },
				{ color: "#1A5276", dash: [] },
				{ color: "#2471A3", dash: [5, 3] },
				{ color: "#D35400", dash: [] },
				{ color: "#1E8449", dash: [4, 2] },
				{ color: "#117A65", dash: [] },
				{ color: "#0E6655", dash: [6, 2] },
				{ color: "#7D3C98", dash: [] },
				{ color: "#6C3483", dash: [4, 2] },
				{ color: "#4A235A", dash: [2, 2] },
				{ color: "#B7950B", dash: [] },
				{ color: "#935116", dash: [5, 2] },
				{ color: "#616A6B", dash: [] },
				{ color: "#2C3E50", dash: [3, 3] },
			];
		</script>
		<!-- ─────────────────────────────────────────────────────────────────────────── -->

		<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
		<script>
			// ── Helpers ────────────────────────────────────────────────────────────────────

			// "MM:SS" or "MM:SS:00" → decimal minutes
			function toLapMin(t) {
				if (!t) return null;
				const parts = t.split(":").map(Number);
				if (parts.length < 2 || isNaN(parts[0]) || isNaN(parts[1])) return null;
				return parts[0] + parts[1] / 60;
			}

			function fmtMin(m) {
				const mins = Math.floor(m);
				const secs = Math.round((m - mins) * 60);
				return `${mins}:${String(secs).padStart(2, "0")}`;
			}

			// ── raceresult API parsing ─────────────────────────────────────────────────────

			function parseRaceresultData(apiData, raceConfig) {
				const rows = [];
				Object.entries(apiData).forEach(([key, lapRows]) => {
					// key: "#N_LastName, FirstName /// N Laps /// Total Time: HH:MM:SS"
					const namePart = key.split(" /// ")[0].replace(/^#\d+_/, "").trim();
					const commaIdx = namePart.indexOf(", ");
					const athleteName =
						commaIdx !== -1
							? namePart.substring(0, commaIdx) +
								" " +
								namePart.substring(commaIdx + 2)
							: namePart;

					const lapMatch = key.match(/(\d+) Laps?/i);
					const totalLaps = lapMatch ? parseInt(lapMatch[1]) : lapRows.length;

					lapRows.forEach((row) => {
						if (!Array.isArray(row) || row.length < 7) return;
						const lapLabel = row[3];
						if (!lapLabel || !lapLabel.startsWith("Lap")) return;
						rows.push({
							athlete: athleteName,
							race: raceConfig.id,
							total_laps: totalLaps,
							lap: lapLabel,
							finish_time: row[5],
							rest_time: row[6],
							category: null,
						});
					});
				});
				return rows;
			}

			// Top 5 by total laps = "top5", everyone else = "other"
			function assignCategories(rows) {
				const athleteTotals = {};
				rows.forEach((r) => {
					if (
						!(r.athlete in athleteTotals) ||
						r.total_laps > athleteTotals[r.athlete]
					) {
						athleteTotals[r.athlete] = r.total_laps;
					}
				});
				const sorted = Object.entries(athleteTotals).sort(
					([, a], [, b]) => b - a,
				);
				const categories = {};
				sorted.forEach(([name], i) => {
					categories[name] = i < 5 ? "top5" : "other";
				});
				rows.forEach((r) => {
					r.category = categories[r.athlete] ?? "other";
				});
			}

			// ── Module state ───────────────────────────────────────────────────────────────
			let allRows = [];
			let chart = null;
			let currentDatasets = []; // datasets array synced with chart
			let globalMaxLap = 0; // max laps across ALL runners in current race

			// ── DOM refs ───────────────────────────────────────────────────────────────────
			const statusEl = document.getElementById("status");
			const mainEl = document.getElementById("main");
			const raceSelect = document.getElementById("raceSelect");

			Chart.register(window["chartjs-plugin-annotation"]);

			// ── Populate race selector ─────────────────────────────────────────────────────
			raceSelect.innerHTML = RACES.map(
				(r) => `<option value="${r.id}">${r.label}</option>`,
			).join("");

			// ── Fetch one race from raceresult ─────────────────────────────────────────────
			async function loadRace(raceConfig) {
				statusEl.textContent = `Loading ${raceConfig.label}…`;
				statusEl.className = "status";
				statusEl.style.display = "block";
				mainEl.style.display = "none";

				const url = `https://my4.raceresult.com/${raceConfig.eventId}/${raceConfig.page}/list?key=${raceConfig.apiKey}&listname=${encodeURIComponent(raceConfig.listname)}&page=${raceConfig.page}`;

				try {
					const res = await fetch(url);
					if (!res.ok) throw new Error("HTTP " + res.status);
					const json = await res.json();
					if (!json.data)
						throw new Error("'data' field missing — check listname / page config");

					const raceRows = parseRaceresultData(json.data, raceConfig);
					if (!raceRows.length)
						throw new Error(
							"No lap rows parsed — check listname / page config",
						);

					assignCategories(raceRows);
					allRows = allRows
						.filter((r) => r.race !== raceConfig.id)
						.concat(raceRows);
					renderChart(raceConfig.id);
				} catch (e) {
					let msg = `Could not load ${raceConfig.label}: ${e.message}.`;
					if (e.message === "Failed to fetch")
						msg +=
							" Possible CORS issue — open from backyards.run, not a local file.";
					statusEl.textContent = msg;
					statusEl.className = "status error";
				}
			}

			// ── Visibility helpers ─────────────────────────────────────────────────────────

			// Recalculate x-axis max from currently visible runners and update chart
			function applyVisibleRange() {
				if (!chart) return;
				let max = 0;
				currentDatasets.forEach((ds, i) => {
					if (chart.isDatasetVisible(i)) max = Math.max(max, ds.totalLaps);
				});
				if (max === 0) max = globalMaxLap;
				// Chart.js 4 category scale: max = label string
				chart.options.scales.x.max = "L" + max;
				chart.update("none");
			}

			// Apply visibility to all datasets via predicate, then sync legend + range
			function setVisibility(predicate) {
				if (!chart) return;
				currentDatasets.forEach((ds, i) => {
					chart.setDatasetVisibility(i, predicate(ds, i));
				});
				applyVisibleRange();
				syncLegendItems();
			}

			// Keep legend pill states in sync with chart visibility
			function syncLegendItems() {
				document.querySelectorAll(".leg-item[data-idx]").forEach((item) => {
					const idx = parseInt(item.dataset.idx, 10);
					item.classList.toggle("hidden", !chart.isDatasetVisible(idx));
				});
			}

			// ── Quick-select buttons ───────────────────────────────────────────────────────
			document
				.getElementById("btnTop3")
				.addEventListener("click", () =>
					setVisibility((ds, i) => i < 3),
				);
			document
				.getElementById("btnAll")
				.addEventListener("click", () => setVisibility(() => true));
			document
				.getElementById("btnNone")
				.addEventListener("click", () => setVisibility(() => false));

			// ── Render ─────────────────────────────────────────────────────────────────────
			function renderChart(raceId) {
				const rows = allRows.filter((r) => r.race === raceId);
				if (!rows.length) return;

				// Build per-athlete data
				const athleteMap = {};
				rows.forEach((r) => {
					if (!athleteMap[r.athlete])
						athleteMap[r.athlete] = {
							category: r.category,
							total: +r.total_laps,
							laps: {},
						};
					const n = parseInt((r.lap || "").replace(/\D/g, ""), 10);
					if (!isNaN(n))
						athleteMap[r.athlete].laps[n] = toLapMin(r.finish_time);
				});

				// Sort: top5 first (by laps desc), then other (by laps desc)
				const sorted = Object.entries(athleteMap).sort(([, a], [, b]) => {
					const cmpCat = (a.category === "top5" ? 0 : 1) - (b.category === "top5" ? 0 : 1);
					return cmpCat !== 0 ? cmpCat : b.total - a.total;
				});

				globalMaxLap = Math.max(...sorted.map(([, a]) => a.total));

				// x-axis labels: L1, L2, … L<globalMaxLap>
				const xLabels = Array.from(
					{ length: globalMaxLap },
					(_, i) => `L${i + 1}`,
				);

				// Build datasets
				currentDatasets = sorted.map(([name, athlete], i) => {
					const style = PALETTE[i % PALETTE.length];
					return {
						label: `${name.split(" ")[0]} (${athlete.total})`,
						fullName: name,
						category: athlete.category,
						totalLaps: athlete.total,
						data: Array.from(
							{ length: globalMaxLap },
							(_, j) => athlete.laps[j + 1] ?? null,
						),
						borderColor: style.color,
						backgroundColor: "transparent",
						borderWidth: 2,
						pointRadius: 3,
						pointHoverRadius: 5,
						tension: 0.3,
						borderDash: style.dash,
						spanGaps: false,
					};
				});

				// Stats
				const maxLaps = globalMaxLap;
				const winner = sorted[0];
				const allTimes = rows.map((r) => toLapMin(r.finish_time)).filter(Boolean);
				const avgTime = allTimes.reduce((a, b) => a + b, 0) / allTimes.length;

				document.getElementById("statsRow").innerHTML = `
	<div class="stat"><div class="stat-label">Runners</div><div class="stat-value">${sorted.length}</div></div>
	<div class="stat"><div class="stat-label">Most laps</div><div class="stat-value">${maxLaps}</div><div class="stat-sub">${winner ? winner[0].split(" ")[0] : ""}</div></div>
	<div class="stat"><div class="stat-label">Avg lap (all)</div><div class="stat-value">${fmtMin(avgTime)}</div></div>
	<div class="stat"><div class="stat-label">Race duration</div><div class="stat-value">${maxLaps}h</div><div class="stat-sub">~${(maxLaps / 24).toFixed(1)} days</div></div>
`;

				// x-axis tick step
				const step =
					globalMaxLap > 60 ? 10 : globalMaxLap > 30 ? 5 : globalMaxLap > 15 ? 2 : 1;

				const textColor = "#999";
				const gridColor = "rgba(0,0,0,0.06)";

				if (chart) chart.destroy();
				chart = new Chart(document.getElementById("chart"), {
					type: "line",
					data: { labels: xLabels, datasets: currentDatasets },
					options: {
						responsive: true,
						maintainAspectRatio: false,
						animation: false,
						interaction: { mode: "index", intersect: false },
						plugins: {
							legend: { display: false },
							annotation: { annotations: {} },
							tooltip: {
								callbacks: {
									title: (ctx) => `Loop ${ctx[0].dataIndex + 1}`,
									label: (ctx) =>
										ctx.parsed.y != null
											? ` ${ctx.dataset.label}: ${fmtMin(ctx.parsed.y)}`
											: null,
									filter: (item) => item.parsed.y != null,
								},
							},
						},
						scales: {
							x: {
								min: "L1",
								max: "L3", // overridden after default visibility is applied
								ticks: {
									color: textColor,
									font: { size: 10 },
									maxRotation: 0,
									autoSkip: false,
									callback(val, i) {
										return (i + 1) % step === 0 || i === 0
											? xLabels[i]
											: "";
									},
								},
								grid: { color: gridColor },
							},
							y: {
								min: 38,
								max: 62,
								title: {
									display: true,
									text: "Lap finish time (min)",
									color: textColor,
									font: { size: 11 },
								},
								ticks: {
									color: textColor,
									font: { size: 11 },
									callback: (v) => v + " min",
								},
								grid: { color: gridColor },
							},
						},
					},
				});

				buildLegend();

				// Default: show top 3 only
				setVisibility((ds, i) => i < 3);

				statusEl.style.display = "none";
				mainEl.style.display = "block";
			}

			// ── Legend ─────────────────────────────────────────────────────────────────────
			function buildLegend() {
				const legendEl = document.getElementById("legend");
				legendEl.innerHTML = "";

				const groups = [
					{ key: "top5", label: "Top 5" },
					{ key: "other", label: "Others" },
				];

				groups.forEach((group) => {
					const groupDs = currentDatasets.filter((d) => d.category === group.key);
					if (!groupDs.length) return;

					const groupLabel = document.createElement("div");
					groupLabel.className = "leg-group-label";
					groupLabel.textContent = group.label;
					legendEl.appendChild(groupLabel);

					groupDs.forEach((ds) => {
						const idx = currentDatasets.indexOf(ds);
						const item = document.createElement("div");
						item.className = "leg-item";
						item.dataset.idx = idx;

						// Canvas swatch
						const sw = document.createElement("canvas");
						sw.width = 26;
						sw.height = 14;
						sw.className = "leg-swatch";
						sw.style.cssText = "width:26px;height:14px;display:block";
						const sc = sw.getContext("2d");
						sc.strokeStyle = ds.borderColor;
						sc.lineWidth = 2.5;
						if (ds.borderDash && ds.borderDash.length)
							sc.setLineDash(ds.borderDash);
						sc.beginPath();
						sc.moveTo(0, 7);
						sc.lineTo(26, 7);
						sc.stroke();

						const name = document.createElement("span");
						name.className = "leg-name";
						name.textContent = ds.label;

						item.appendChild(sw);
						item.appendChild(name);
						legendEl.appendChild(item);

						item.addEventListener("click", () => {
							const isVisible = chart.isDatasetVisible(idx);
							chart.setDatasetVisibility(idx, !isVisible);
							item.classList.toggle("hidden", isVisible);
							applyVisibleRange();
						});
					});
				});
			}

			// ── Init ───────────────────────────────────────────────────────────────────────
			raceSelect.addEventListener("change", () => {
				const cfg = RACES.find((r) => r.id === raceSelect.value);
				if (cfg) loadRace(cfg);
			});

			if (RACES.length > 0) loadRace(RACES[0]);
		</script>
	</body>
</html>
